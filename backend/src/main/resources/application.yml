spring:
  application:
    name: finance-api
  datasource:
    # Env-driven so the same build runs anywhere. Defaults target the local docker-compose
    # Postgres. In production (Cloud Run) these env vars point at Neon, e.g.:
    #   DB_URL=jdbc:postgresql://<endpoint>-pooler.<region>.aws.neon.tech/neondb?sslmode=require
    #   DB_USER=neondb_owner
    #   DB_PASSWORD=<from Secret Manager — never commit it>
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance}
    username: ${DB_USER:finance}
    password: ${DB_PASSWORD:finance}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
  # SMTP for the email digest. Leave MAIL_HOST unset to disable email (sends are skipped, app still runs).
  # Example (Brevo free tier): MAIL_HOST=smtp-relay.brevo.com MAIL_PORT=587 plus MAIL_USERNAME / MAIL_PASSWORD.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Path to a Firebase service-account JSON. When empty, the app falls back to
# Application Default Credentials (works automatically on Cloud Run).
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  project-id: ${FIREBASE_PROJECT_ID:}

# Comma-separated list of allowed browser origins for CORS.
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # Public SPA URL used in digest email links.
  public-url: ${PUBLIC_URL:https://gcp-learning-acnt.web.app}
  mail:
    # Master switch for outbound email. Set MAIL_ENABLED=true once SMTP env vars are configured.
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@finovia.app}
    from-name: ${MAIL_FROM_NAME:Finovia}
  digest:
    # Shared secret required (X-Digest-Token header) to trigger /api/internal/digests/run.
    # Leave unset to disable scheduled runs.
    token: ${DIGEST_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}
  shutdown: graceful

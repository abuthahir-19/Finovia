# Activated on Cloud Run with SPRING_PROFILES_ACTIVE=gcp.
# Connects to Cloud SQL via the PostgreSQL Socket Factory (no Cloud SQL Proxy needed).
#
# Required env vars (wire DB_PASSWORD from Secret Manager):
#   CLOUD_SQL_CONNECTION_NAME = project:region:instance
#   DB_NAME, DB_USER, DB_PASSWORD
spring:
  datasource:
    url: jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory&ipTypes=PRIVATE,PUBLIC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
